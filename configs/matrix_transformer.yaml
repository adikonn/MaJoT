# Example experiment config for the MatrixTransformer.
# Run with:
#   python scripts/train.py --config configs/matrix_transformer.yaml
# Override any field from the CLI, e.g.:
#   python scripts/train.py --config configs/matrix_transformer.yaml --override training.lr=3e-4 model.num_layers=6

experiment_name: matrix_transformer_v2
seed: 42
device: cuda  # falls back to cpu automatically if CUDA isn't available
checkpoint_dir: checkpoints/matrix_transformer_v2

model:
  name: matrix_transformer
  hidden_dim: 128
  num_heads: 4
  num_layers: 3
  max_n: 32
  dropout: 0.1
  ffn_mult: 4

data:
  ns: [4, 6, 8]
  types: ["perfect", "noisy"]
  noise_level: 1.0e-3
  samples_per_n_per_type: 5000
  val_fraction: 0.1
  batch_size: 64
  seed: 42
  test_samples_per_n_per_type: 100
  test_seed: 999

training:
  epochs: 60
  lr: 3.0e-4
  weight_decay: 1.0e-2
  lambda_orth: 1.0
  grad_clip: 1.0
  scheduler: cosine   # cosine | null

wandb:
  project: majot
  entity: null         # set this to your wandb username/team or leave null
  mode: online         # online | offline | disabled
  tags: ["matrix_transformer", "baseline_comparison"]
