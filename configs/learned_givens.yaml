experiment_name: learned_givens_v1
seed: 42
device: cuda
checkpoint_dir: checkpoints/learned_givens_v1

model:
  name: learned_givens
  hidden_dim: 128
  num_heads: 4
  num_layers: 3
  max_n: 32
  num_rotations: 64
  dropout: 0.1
  ffn_mult: 4

data:
  ns: [4, 6, 8]
  types: ["perfect", "noisy"]
  noise_level: 1.0e-3
  samples_per_n_per_type: 5000
  val_fraction: 0.1
  batch_size: 64
  seed: 42
  test_samples_per_n_per_type: 100
  test_seed: 999

training:
  epochs: 60
  lr: 3.0e-4
  weight_decay: 1.0e-2
  lambda_orth: 0.1
  grad_clip: 1.0
  scheduler: cosine

wandb:
  project: majot
  entity: null
  mode: online
  tags: ["learned_givens", "baseline_comparison"]
