experiment_name: "cross_attn_v1"
seed: 42

model:
  name: "cross_attn_triangularizer"
  hidden_dim: 64
  num_heads: 4

data:
  ns: [10, 20, 30] 
  batch_size: 32
  types: ["perfect", "noisy", "random"]
  samples_per_n_per_type: 100
  val_fraction: 0.1

training:
  epochs: 2
  lr: 0.001
  lambda_orth: 1.0

wandb:
  project: "majot"
  mode: "online"